<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./stylesdiagrama.css">
</head>

<body>
    <div class="titulo">
        <h1 class="title-diagram">Diagrama de Venn</h1>
    </div>
    <div class="diagramas-bases">
        <div class="diagram-and">

            <div class="div-lines">

                <div class="div-button-lines">
                    <div class="div-button">
                        <button id="and-btn-a1" class="btn" onclick="setLogicAndA(1)">1</button>
                        <button id="and-btn-a0" class="btn" onclick="setLogicAndA(0)">0</button>
                    </div>
                    <div class="div-line">
                        <hr class="line-a" id="line-a">
                    </div>
                </div>

                <div class="div-button-lines">
                    <div class="div-button">
                        <button id="and-btn-b1" class="btn" onclick="setLogicAndB(1)">1</button>
                        <button id="and-btn-b0" class="btn" onclick="setLogicAndB(0)">0</button>
                    </div>
                    <div class="div-line">
                        <hr class="line-b" id="line-b">
                    </div>
                </div>

            </div>

            <div class="div-logica">
                <h1>AND</h1>
            </div>
            <div class="div-bombillo">

                <div class="div-line-bombillo">
                    <hr class="line-bombillo" id="line-bombillo">
                </div>
                <div class="div-luz">
                    <div class="bombillo" id="bombillo"></div>
                </div>
            </div>

        </div>

        <div class="diagram-or">

            <div class="div-lines">

                <div class="div-button-lines">
                    <div class="div-button">
                        <button id="or-btn-a1" class="btn" onclick="setLogicOrA(1)">1</button>
                        <button id="or-btn-a0" class="btn" onclick="setLogicOrA(0)">0</button>
                    </div>
                    <div class="div-line">
                        <hr class="or-line-a" id="or-line-a">
                    </div>
                </div>

                <div class="div-button-lines">
                    <div class="div-button">
                        <button id="or-btn-b1" class="btn" onclick="setLogicOrB(1)">1</button>
                        <button id="or-btn-b0" class="btn" onclick="setLogicOrB(0)">0</button>
                    </div>
                    <div class="div-line">
                        <hr class="or-line-b" id="or-line-b">
                    </div>
                </div>

            </div>

            <div class="div-logica-or">
                <h1>OR</h1>
            </div>
            <div class="div-bombillo">

                <div class="div-line-bombillo">
                    <hr class="or-line-bombillo" id="or-line-bombillo">
                </div>
                <div class="div-luz">
                    <div class="bombillo-or" id="bombillo-or"></div>
                </div>
            </div>

        </div>

        <div class="diagram-not">

            <div class="div-lines-not">

                <div class="div-button-lines">
                    <div class="div-button">
                        <button id="not-btn-a1" class="btn" onclick="setLogicNotA(1)">1</button>
                        <button id="not-btn-a0" class="btn" onclick="setLogicNotA(0)">0</button>
                    </div>
                    <div class="div-line">
                        <hr class="not-line" id="not-line">
                    </div>
                </div>

            </div>

            <div class="div-logica-not">
                <h1>NOT</h1>
            </div>
            <div class="icon-not"></div>
            <div class="div-bombillo">

                <div class="div-line-bombillo">
                    <hr class="not-line-bombillo" id="not-line-bombillo">
                </div>
                <div class="div-luz">
                    <div class="bombillo-not" id="bombillo-not"></div>
                </div>
            </div>
        </div>

    </div>

    <script src="./logicaDiagrama.js"></script>
</body>

</html>
